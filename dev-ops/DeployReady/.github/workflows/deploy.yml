name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Node.js environment for running tests
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Install dependencies and run tests - pipeline stops if tests fail
      - name: Run tests
        working-directory: ./dev-ops/DeployReady/app
        run: |
          npm install
          npm test

      # Log in to GitHub Container Registry to push Docker images
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build Docker image and tag it with the commit SHA for versioning
      - name: Build Docker image
        working-directory: ./dev-ops/DeployReady
        run: |
          docker build -t ghcr.io/trtheo/deployready:${{ github.sha }} .
          docker tag ghcr.io/trtheo/deployready:${{ github.sha }} ghcr.io/trtheo/deployready:latest

      # Push the Docker image to GitHub Container Registry
      - name: Push Docker image
        run: |
          docker push ghcr.io/trtheo/deployready:${{ github.sha }}
          docker push ghcr.io/trtheo/deployready:latest

      # SSH into EC2 server, pull the new image, and restart the container
      # If health check fails after deploy, automatically rollback to previous image
      - name: Deploy to EC2
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          SERVER_IP: ${{ secrets.EC2_SERVER_IP }}
        run: |
          echo "$SSH_PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem
          ssh -o StrictHostKeyChecking=no -i private_key.pem ubuntu@$SERVER_IP << 'EOF'
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}

            # Save previous image tag for rollback
            PREVIOUS_IMAGE=$(docker inspect --format='{{.Config.Image}}' deployready 2>/dev/null || echo "")
            echo "Previous image: $PREVIOUS_IMAGE"

            # Deploy new image
            docker pull ghcr.io/trtheo/deployready:${{ github.sha }}
            docker stop deployready || true
            docker rm deployready || true
            docker run -d --name deployready -p 80:3000 -e PORT=3000 --restart unless-stopped ghcr.io/trtheo/deployready:${{ github.sha }}

            # Health check with retries
            echo "Running health check..."
            RETRIES=5
            HEALTHY=false
            for i in $(seq 1 $RETRIES); do
              sleep 5
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/health)
              echo "Attempt $i: HTTP $STATUS"
              if [ "$STATUS" = "200" ]; then
                HEALTHY=true
                break
              fi
            done

            # Rollback if health check failed
            if [ "$HEALTHY" = "false" ]; then
              echo "Health check failed! Rolling back to $PREVIOUS_IMAGE"
              docker stop deployready || true
              docker rm deployready || true
              if [ -n "$PREVIOUS_IMAGE" ]; then
                docker run -d --name deployready -p 80:3000 -e PORT=3000 --restart unless-stopped $PREVIOUS_IMAGE
                echo "Rollback complete"
              else
                echo "No previous image found, rollback skipped"
              fi
              exit 1
            fi

            echo "Deployment successful!"
          EOF
          rm -f private_key.pem
